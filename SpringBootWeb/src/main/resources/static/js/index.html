<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>员工列表</title>
  <!-- 引入Vue -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: center;
    }
    th {
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>
<div id="app" style="max-width: 1200px; margin: 0 auto;">
  <h2>员工信息表</h2>
  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>姓名</th>
      <th>性别</th>
      <th>年龄</th>
      <th>部门</th>
      <th>职位</th>
      <th>学历</th>
      <th>入职时间</th>
      <th>联系电话</th>
    </tr>
    </thead>
    <tbody>
    <tr v-for="item in employeeList" :key="item.id">
      <td>{{ item.id }}</td>
      <td>{{ item.name }}</td>
      <td>{{ item.gender }}</td>
      <td>{{ item.age }}</td>
      <td>{{ item.department }}</td>
      <td>{{ item.position }}</td>
      <td>{{ item.education }}</td>
      <td>{{ item.joinTime }}</td>
      <td>{{ item.phone }}</td>
    </tr>
    </tbody>
  </table>
</div>

<!-- 引入 axios CDN -->
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script>
  new Vue({
    el: '#app',
    data: {
      employeeList: []
    },
    mounted() {
      this.getEmployeeList();
    },
    methods: {
      async getEmployeeList() {
        const response = await axios.get('/list')
          .then(response => {
            console.log(response);
            this.employeeList = response.data;
          })
          .catch(error => {
            console.error('Error:', error);
          });
      }
    }
  })
</script>
</body>
</html>
